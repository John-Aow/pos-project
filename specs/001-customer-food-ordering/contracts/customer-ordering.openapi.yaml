openapi: 3.1.0
info:
  title: Customer Food Ordering API
  version: 0.1.0
  description: API contract for customer menu browsing, order submission, staff visibility, and order status.
paths:
  /api/menu:
    get:
      summary: List customer-visible menu items
      operationId: listCustomerMenu
      responses:
        "200":
          description: Customer menu items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuListResponse"
  /api/orders:
    post:
      summary: Submit a customer order
      operationId: submitCustomerOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitOrderRequest"
      responses:
        "201":
          description: Order accepted and confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderConfirmation"
        "400":
          description: Invalid cart, quantity, note, or unavailable item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate or conflicting idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/orders/{orderNumber}/status:
    get:
      summary: Get current customer-visible order status
      operationId: getOrderStatus
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Current order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusResponse"
        "404":
          description: Order number not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/staff/orders:
    get:
      summary: List incoming and active staff-visible orders
      operationId: listStaffOrders
      responses:
        "200":
          description: Incoming and active orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffOrderListResponse"
components:
  schemas:
    MenuListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
    MenuItem:
      type: object
      required: [id, name, description, price_cents, stock_quantity, is_available, is_active, category_id]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price_cents:
          type: integer
          format: int64
          minimum: 1
        stock_quantity:
          type: integer
          minimum: 0
        is_available:
          type: boolean
        is_active:
          type: boolean
        category_id:
          type: integer
          format: int64
    SubmitOrderRequest:
      type: object
      required: [idempotency_key, items]
      properties:
        idempotency_key:
          type: string
          minLength: 8
          maxLength: 120
        customer_reference:
          type: string
          maxLength: 120
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SubmitOrderItem"
    SubmitOrderItem:
      type: object
      required: [menu_item_id, quantity]
      properties:
        menu_item_id:
          type: integer
          format: int64
          minimum: 1
        quantity:
          type: integer
          minimum: 1
        note:
          type: string
          maxLength: 500
    OrderConfirmation:
      type: object
      required: [order_number, status, total_cents, submitted_at, items]
      properties:
        order_number:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        total_cents:
          type: integer
          format: int64
          minimum: 0
        submitted_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
    OrderLine:
      type: object
      required: [menu_item_id, name, price_cents, quantity, line_total_cents]
      properties:
        menu_item_id:
          type: integer
          format: int64
        name:
          type: string
        price_cents:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1
        note:
          type: string
        line_total_cents:
          type: integer
          format: int64
    OrderStatus:
      type: string
      enum: [pending, preparing, served, canceled]
    OrderStatusResponse:
      type: object
      required: [order_number, status]
      properties:
        order_number:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        updated_at:
          type: string
          format: date-time
    StaffOrderListResponse:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderConfirmation"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        unavailable_item_ids:
          type: array
          items:
            type: integer
            format: int64
